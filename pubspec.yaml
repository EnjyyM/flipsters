name: flipster_game
description: Flipster card matching game with Firebase

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.2.5  # Add this line exactly here

  # Firebase packages — these 3 are all you need
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0   # optional, keep for future login feature

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/png1.jpeg
    - assets/images/png2.jpeg
    - assets/images/png3.jpeg
    - assets/images/png4.jpeg
    - assets/images/png5.jpeg


firebase_core: ^2.32.0
cloud_firestore: ^5.6.0